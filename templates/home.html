<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
            width: 450px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #2e7d32;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>FWI Prediction</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <input type="text" name="Temperature" placeholder="Temperature" required>

            <input type="text" name="RH" placeholder="Relative Humidity (RH)" required>

            <input type="text" name="Ws" placeholder="Wind Speed (Ws)" required>

            <input type="text" name="Rain" placeholder="Rain" required>

            <input type="text" name="FFMC" placeholder="FFMC" required>

            <input type="text" name="DMC" placeholder="DMC" required>

            <input type="text" name="ISI" placeholder="ISI" required>

            <input type="text" name="Classes" placeholder="Classes" required>

            <input type="text" name="Region" placeholder="Region" required>

            <button type="submit">Predict</button>

        </form>

        <h2 style="margin-top:20px; color:#2e7d32; text-align:center;">
            Predicted FWI: {{ results }}
        </h2>

    </div>

</body>

</html>
